{% extends 'base.html' %}
{% load crispy_forms_tags %}
{% block title %}New Research Project{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-8">
    <h2>New Research Project</h2>
    <form method="post">
      {% csrf_token %}
      {{ form|crispy }}
      <button type="submit" class="btn btn-primary">Start Research</button>
      <a href="{% url 'research:project-list' %}" class="btn btn-outline-secondary ms-2">Cancel</a>
    </form>
  </div>
</div>
{% endblock %}
