<span class="badge bg-{% if project.status == 'done' %}success{% elif project.status == 'running' %}warning{% elif project.status == 'analysing' %}info{% elif project.status == 'error' %}danger{% else %}secondary{% endif %} fs-6"
  {% if project.status == 'running' or project.status == 'analysing' %}
    hx-get="{% url 'research:research-status' project.public_id %}"
    hx-trigger="every 3s"
    hx-target="this"
    hx-swap="outerHTML"
  {% endif %}>
  {% if project.status == 'analysing' %}Tiefenanalyse…{% else %}{{ project.status }}{% endif %}
</span>
