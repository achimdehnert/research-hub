{% extends 'base.html' %}
{% block title %}Neuer Workspace{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-7">
    <div class="d-flex align-items-center gap-3 mb-4">
      <a href="{% url 'research:workspace-list' %}" class="btn btn-outline-secondary btn-sm">
        <i class="bi bi-arrow-left"></i>
      </a>
      <h2 class="fw-bold mb-0">Neuer Workspace</h2>
    </div>
    <div class="card">
      <div class="card-body p-4">
        <form method="post">
          {% csrf_token %}
          <div class="mb-3">
            <label class="form-label fw-semibold">Name</label>
            {{ form.name }}
          </div>
          <div class="mb-4">
            <label class="form-label fw-semibold">Beschreibung</label>
            {{ form.description }}
            <div class="form-text text-muted">z.B. Klimawandel-Buch, Serie XY, Projekt Alpha</div>
          </div>
          <button type="submit" class="btn btn-primary w-100">
            <i class="bi bi-folder-plus me-1"></i>Workspace erstellen
          </button>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
