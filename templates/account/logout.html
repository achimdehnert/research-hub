{% extends 'base.html' %}
{% block title %}Abmelden — Research Hub{% endblock %}
{% block content %}
<div class="auth-card">
  <div class="card">
    <div class="card-body text-center">
      <i class="bi bi-box-arrow-right fs-1 mb-3" style="color:#6366f1"></i>
      <h2 class="fw-bold">Wirklich abmelden?</h2>
      <p class="text-muted">Du wirst aus deinem Konto ausgeloggt.</p>
      <form method="post">
        {% csrf_token %}
        <div class="d-grid gap-2 mt-4">
          <button type="submit" class="btn btn-danger">
            <i class="bi bi-box-arrow-right me-2"></i>Abmelden
          </button>
          <a href="/" class="btn btn-outline-secondary">Abbrechen</a>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
