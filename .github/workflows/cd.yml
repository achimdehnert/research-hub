name: CD — Build & Push GHCR

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      tag:
        description: Image tag (default: latest)
        default: latest

jobs:
  build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/achimdehnert/research-hub/research-hub-web:latest
            ghcr.io/achimdehnert/research-hub/research-hub-web:${{ github.sha }}
