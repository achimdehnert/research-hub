name: "Deploy"

permissions:
  contents: read
  packages: write

concurrency:
  group: deploy-research-hub-${{ github.ref_name }}
  cancel-in-progress: true

on:
  push:
    branches: ["main"]
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      image_tag_override:
        description: "Rollback auf Image-Tag (z.B. v1.2.1) — leer = auto"
        required: false
        default: ""
      target_environment:
        description: "Ziel-Environment (leer=auto, staging, production)"
        required: false
        default: "production"
        type: choice
        options:
          - production
          - staging

jobs:
  ci:
    uses: iilgmbh/shared-ci/.github/workflows/_ci-python.yml@v1.0.0
    if: startsWith(github.ref, 'refs/heads/')
    with:
      skip_tests: true
      django_settings_module: "config.settings.test"
    secrets: inherit

  deploy:
    needs: [ci]
    if: always() && (needs.ci.result == 'success' || needs.ci.result == 'skipped')
    uses: iilgmbh/shared-ci/.github/workflows/_deploy-unified.yml@v1.0.0
    with:
      app_name: "research-hub"
      app_path: "/opt/research-hub"
      health_check_url: "https://research.iil.pet/healthz/"
      image_tag_override: ${{ inputs.image_tag_override || '' }}
      target_environment: ${{ inputs.target_environment || 'production' }}
      notify_discord: true
    secrets: inherit
