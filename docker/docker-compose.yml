version: '3.8'

services:
  web:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: research_hub_web
    ports:
      - "8095:8000"
    env_file:
      - ../.env
    depends_on:
      - db
      - redis
    volumes:
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/"]
      interval: 30s
      timeout: 10s
      retries: 3

  celery:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: research_hub_celery
    command: celery -A config worker -l info -Q default
    env_file:
      - ../.env
    depends_on:
      - db
      - redis
    restart: unless-stopped

  celery-beat:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: research_hub_beat
    command: celery -A config beat -l info
    env_file:
      - ../.env
    depends_on:
      - db
      - redis
    restart: unless-stopped

  db:
    image: pgvector/pgvector:pg16
    container_name: research_hub_db
    environment:
      POSTGRES_DB: research_hub
      POSTGRES_USER: research_hub
      POSTGRES_PASSWORD: research_hub
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: research_hub_redis
    volumes:
      - redis_data:/data
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  static_volume:
  media_volume:
